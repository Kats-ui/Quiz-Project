<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz Game</title>
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with this fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>


        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="quistion-text">Questions</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span>5</span>
                    </p>
                    
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>

            <div class="answers-container" id="answers-container">
                <!-- Answer buttons will be inserted here from our js code later at some point-->
            </div>
        </div>
    </div>
</body>
</html>
